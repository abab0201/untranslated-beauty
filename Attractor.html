<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>奇妙な引力 — Dynamic Clifford Attractor</title>
<style>
  :root {
    --ink: #050608;
    --bone: #e8e2d6;
    --dim: #8d8678;
    --accent: #c9a86a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body, html {
    width: 100%;
    height: 100%;
    background: var(--ink);
    color: var(--bone);
    font-family: "Courier New", monospace;
    overflow: hidden; /* スクロールバーを隠す */
  }
  canvas {
    display: block;
    width: 100%;
    height: 100%;
  }
  .overlay {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 2rem;
    background: radial-gradient(circle at center, transparent 0%, rgba(5,6,8,0.4) 100%);
  }
  .header h1 {
    font-family: "Hiragino Mincho ProN", "Yu Mincho", Georgia, serif;
    font-size: 1.5rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    margin-bottom: 0.5rem;
  }
  .header h1 em {
    font-style: normal;
    color: var(--accent);
    font-family: "Courier New", monospace;
    font-size: 1rem;
    letter-spacing: 0.2em;
    margin-left: 10px;
  }
  .desc {
    font-size: 0.75rem;
    color: var(--dim);
    letter-spacing: 0.15em;
    max-width: 400px;
    line-height: 1.8;
  }
  .footer {
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    color: var(--dim);
    display: flex;
    justify-content: space-between;
  }
  #params-display {
    color: var(--accent);
  }
</style>
</head>
<body>

  <canvas id="c"></canvas>

  <div class="overlay">
    <div class="header">
      <h1>奇妙な引力 <em>CLIFFORD ATTRACTOR</em></h1>
      <p class="desc">
        無数の点が数式に従い永遠に軌道を描き続ける。<br>
        パラメータは微小な揺らぎを持ち、<br>
        この形は二度と同じ姿を繰り返すことはない。
      </p>
    </div>
    <div class="footer">
      <span>LIVE SPECIMEN — DETERMINISTIC CHAOS</span>
      <span id="params-display">a: 0.000, b: 0.000, c: 0.000, d: 0.000</span>
    </div>
  </div>

<script>
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d', { alpha: false }); // パフォーマンス最適化
  const paramsDisplay = document.getElementById('params-display');

  let width, height, cx, cy, scale;

  // アニメーション設定
  const PARTICLE_COUNT = 15000;
  const TRAIL_FADE = 0.03; // 軌跡の長さ（少し長く残るように調整）
  const TIME_SPEED = 0.0005; // パラメータが変化する速度
  const FLOW_SPEED = 0.02; // ★追加：パーティクルの移動速度（滑らかさ）

  // パーティクル配列
  let particles = [];

  // ★変更：ページを更新するたびに全く異なるパラメータをランダムに生成する
  // (-2.0 から 2.0 の範囲でランダムな値を設定)
  const baseA = (Math.random() - 0.5) * 4;
  const baseB = (Math.random() - 0.5) * 4;
  const baseC = (Math.random() - 0.5) * 4;
  const baseD = (Math.random() - 0.5) * 4;

  // キャンバスサイズの初期化とリサイズ処理
  function resize() {
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = width;
    canvas.height = height;
    cx = width / 2;
    cy = height / 2;
    // 画面サイズに合わせてスケールを調整
    scale = Math.min(width, height) / 6; 
    ctx.fillStyle = '#050608';
    ctx.fillRect(0, 0, width, height);
  }
  window.addEventListener('resize', resize);
  resize();

  // パーティクルの初期化
  function initParticles() {
    particles = [];
    for (let i = 0; i < PARTICLE_COUNT; i++) {
      particles.push({
        x: (Math.random() - 0.5) * 4,
        y: (Math.random() - 0.5) * 4,
        colorOffset: Math.random() // 色のばらつき用
      });
    }
  }
  initParticles();

  // ★変更：時間の初期値もランダムにして、揺らぎのスタート地点を毎回変える
  let time = Math.random() * 1000;

  // 描画ループ
  function draw() {
    time += TIME_SPEED;

    // パラメータを時間経過とともに緩やかに変化させる（モーフィング）
    const a = baseA + Math.sin(time * 1.1) * 0.3;
    const b = baseB + Math.cos(time * 0.8) * 0.3;
    const c = baseC + Math.sin(time * 1.3) * 0.3;
    const d = baseD + Math.cos(time * 0.9) * 0.3;

    // UIのパラメータ表示を更新
    paramsDisplay.textContent = `a: ${a.toFixed(3)}, b: ${b.toFixed(3)}, c: ${c.toFixed(3)}, d: ${d.toFixed(3)}`;

    // 残像（軌跡）を作るために、半透明の黒で画面を塗りつぶす
    ctx.fillStyle = `rgba(5, 6, 8, ${TRAIL_FADE})`;
    ctx.fillRect(0, 0, width, height);

    // 光の重なりを表現するためのブレンドモード
    ctx.globalCompositeOperation = 'lighter';

    for (let i = 0; i < PARTICLE_COUNT; i++) {
      let p = particles[i];

      // 前回の座標（画面上）
      const oldScreenX = cx + p.x * scale;
      const oldScreenY = cy + p.y * scale;

      // Clifford Attractor の数式を「速度（風の向き）」として扱う
      const vx = Math.sin(a * p.y) + c * Math.cos(a * p.x);
      const vy = Math.sin(b * p.x) + d * Math.cos(b * p.y);

      // 座標を滑らかに更新（流体的な移動）
      p.x += vx * FLOW_SPEED;
      p.y += vy * FLOW_SPEED;

      // 新しい座標（画面上）
      const newScreenX = cx + p.x * scale;
      const newScreenY = cy + p.y * scale;

      // 速度（画面上の実際の移動距離）に基づいて色を決定
      const dx = newScreenX - oldScreenX;
      const dy = newScreenY - oldScreenY;
      const speed = Math.sqrt(dx * dx + dy * dy);
      
      // 動的に色を変化させる（青系からゴールド系へ）
      const hue = 200 - speed * 15 + Math.sin(time) * 20; 
      const lightness = Math.min(70, 20 + speed * 10);
      const alpha = 0.4;

      ctx.strokeStyle = `hsla(${hue}, 60%, ${lightness}%, ${alpha})`;
      ctx.lineWidth = 1;

      // 線を描画
      ctx.beginPath();
      ctx.moveTo(oldScreenX, oldScreenY);
      ctx.lineTo(newScreenX, newScreenY);
      ctx.stroke();

      // 画面外に飛び出た場合、またはランダムな確率で中心付近にリセット
      if (Math.random() < 0.001 || p.x < -8 || p.x > 8 || p.y < -8 || p.y > 8) {
        p.x = (Math.random() - 0.5) * 4;
        p.y = (Math.random() - 0.5) * 4;
      }
    }

    // ブレンドモードを元に戻す
    ctx.globalCompositeOperation = 'source-over';

    requestAnimationFrame(draw);
  }

  // アニメーション開始
  draw();
</script>
</body>
</html>
