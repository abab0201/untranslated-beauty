<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>奇妙な引力 — Theremin Attractor</title>
<style>
  :root {
    --ink: #050608;
    --bone: #e8e2d6;
    --dim: #8d8678;
    --accent: #c9a86a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body, html {
    width: 100%;
    height: 100%;
    background: var(--ink);
    overflow: hidden;
    /* スワイプによるスクロールやリロードを防ぐ */
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }
  canvas {
    display: block;
    width: 100%;
    height: 100%;
    cursor: crosshair;
  }
  #ui {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: rgba(255, 255, 255, 0.4);
    font-family: sans-serif;
    letter-spacing: 0.2em;
    pointer-events: none;
    transition: opacity 1s ease;
  }
</style>
</head>
<body>

  <div id="ui">TOUCH TO PLAY</div>
  <canvas id="c" title="タッチした場所からカオスと音を生み出す"></canvas>

<script>
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d', { alpha: false });
  const ui = document.getElementById('ui');

  let width, height, cx, cy, scale;

  // --- ビジュアル設定 ---
  const PARTICLE_COUNT = 15000;
  const TRAIL_FADE = 0.04; 
  const TIME_SPEED = 0.0005; 
  
  const FLOW_SPEED = 0.06;
  const FRICTION = 0.95;  
  const FORCE = 0.05;      
  const BOUNCE = -0.9;     

  let particles = [];
  let baseA, baseB, baseC, baseD;
  let baseHue = 210; 

  // --- オーディオ設定 (Web Audio API) ---
  let audioCtx;
  let masterGain, delayNode, feedbackGain;
  
  // アクティブなタッチポイント（ポインタ）を管理するMap
  const activePointers = new Map();

  // オーディオシステムの初期化
  function initAudio() {
    if (audioCtx) return; // 既に初期化されていればスキップ
    ui.style.opacity = '0'; // UIを隠す

    const AudioContext = window.AudioContext || window.webkitAudioContext;
    audioCtx = new AudioContext();

    // マスターゲイン（全体の音量）
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.4;
    masterGain.connect(audioCtx.destination);

    // 幻想的な空間を作るためのディレイ（エコー）
    delayNode = audioCtx.createDelay();
    delayNode.delayTime.value = 0.5; // 0.5秒遅れ
    
    feedbackGain = audioCtx.createGain();
    feedbackGain.gain.value = 0.5; // エコーの減衰率

    delayNode.connect(feedbackGain);
    feedbackGain.connect(delayNode);
    delayNode.connect(masterGain);
  }

  // テルミン風の音を出すシンセサイザークラス
  class ThereminVoice {
    constructor(x, y) {
      this.osc = audioCtx.createOscillator();
      this.gainNode = audioCtx.createGain();
      
      // サイン波で純粋な音色に
      this.osc.type = 'sine';
      
      // テルミン特有のビブラート（音の揺れ）を追加
      this.lfo = audioCtx.createOscillator();
      this.lfoGain = audioCtx.createGain();
      this.lfo.type = 'sine';
      this.lfo.frequency.value = 6; // 6Hzの揺れ
      this.lfoGain.gain.value = 15; // ピッチの揺れ幅
      
      this.lfo.connect(this.lfoGain);
      this.lfoGain.connect(this.osc.detune);
      
      this.osc.connect(this.gainNode);
      // 原音とエコーの両方に出力
      this.gainNode.connect(masterGain);
      this.gainNode.connect(delayNode);
      
      this.gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
      this.update(x, y); // 初期位置でピッチ・音量を設定
      
      this.osc.start();
      this.lfo.start();
      
      // 滑らかにフェードイン（アタック）
      this.gainNode.gain.setTargetAtTime(this.targetVolume, audioCtx.currentTime, 0.1);
    }
    
    update(x, y) {
      // X座標をピッチにマッピング (例: 左端で低音、右端で高音。対数スケールで自然に)
      // 基準音100Hzから4オクターブ分
      const freq = 100 * Math.pow(2, (x / width) * 4); 
      // ポルタメント（滑らかなピッチ移動）
      this.osc.frequency.setTargetAtTime(freq, audioCtx.currentTime, 0.05); 
      
      // Y座標を音量にマッピング (上に行くほど音が大きく)
      this.targetVolume = 1.0 - (y / height);
      // 最小音量・最大音量を制限
      this.targetVolume = Math.max(0.1, Math.min(1.0, this.targetVolume));
      this.gainNode.gain.setTargetAtTime(this.targetVolume, audioCtx.currentTime, 0.05);
    }
    
    stop() {
      // 滑らかにフェードアウト（リリース）
      this.gainNode.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
      setTimeout(() => {
        this.osc.stop();
        this.lfo.stop();
        this.osc.disconnect();
        this.lfo.disconnect();
        this.gainNode.disconnect();
      }, 1000);
    }
  }

  // --- ビジュアルの関数 ---

  function randomizeParams() {
    baseA = (Math.random() - 0.5) * 4;
    baseB = (Math.random() - 0.5) * 4;
    baseC = (Math.random() - 0.5) * 4;
    baseD = (Math.random() - 0.5) * 4;
    baseHue = Math.random() * 360;
  }
  randomizeParams();

  function resize() {
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = width;
    canvas.height = height;
    cx = width / 2;
    cy = height / 2;
    scale = Math.min(width, height) / 6; 
    ctx.fillStyle = '#050608';
    ctx.fillRect(0, 0, width, height);
    
    initParticles();
  }
  window.addEventListener('resize', resize);

  function initParticles() {
    particles = [];
    for (let i = 0; i < PARTICLE_COUNT; i++) {
      particles.push({
        x: (Math.random() - 0.5) * (width / scale) * 2,
        y: (Math.random() - 0.5) * (height / scale) * 2,
        vx: 0,
        vy: 0,
        colorOffset: (Math.random() - 0.5) * 80 
      });
    }
  }

  // --- タッチ＆マウス イベント処理 (Pointer Events) ---

  function handlePointerDown(e) {
    initAudio();
    if(audioCtx.state === 'suspended') audioCtx.resume();

    // 新しい音と色の生成
    const hue = Math.random() * 360;
    const voice = new ThereminVoice(e.clientX, e.clientY);
    
    activePointers.set(e.pointerId, { 
      x: e.clientX, 
      y: e.clientY, 
      voice: voice, 
      hue: hue 
    });
    
    randomizeParams(); 

    // クリック・タッチした地点から爆発するようにパーティクルを再配置
    const originX = (e.clientX - cx) / scale;
    const originY = (e.clientY - cy) / scale;
    
    // 全体の1/4のパーティクルを集めて弾けさせる
    for (let i = 0; i < PARTICLE_COUNT / 4; i++) {
      const p = particles[Math.floor(Math.random() * PARTICLE_COUNT)];
      p.x = originX + (Math.random() - 0.5) * 0.1;
      p.y = originY + (Math.random() - 0.5) * 0.1;
      const angle = Math.random() * Math.PI * 2;
      const power = Math.random() * 20; 
      p.vx = Math.cos(angle) * power;
      p.vy = Math.sin(angle) * power;
      p.colorOffset = hue; 
    }
  }

  function handlePointerMove(e) {
    if (activePointers.has(e.pointerId)) {
      const pointer = activePointers.get(e.pointerId);
      pointer.x = e.clientX;
      pointer.y = e.clientY;
      // 指の移動に合わせて音程・音量を更新
      pointer.voice.update(e.clientX, e.clientY);
    }
  }

  function handlePointerUp(e) {
    if (activePointers.has(e.pointerId)) {
      const pointer = activePointers.get(e.pointerId);
      // 音をフェードアウトして削除
      pointer.voice.stop();
      activePointers.delete(e.pointerId);
    }
  }

  canvas.addEventListener('pointerdown', handlePointerDown);
  canvas.addEventListener('pointermove', handlePointerMove);
  canvas.addEventListener('pointerup', handlePointerUp);
  canvas.addEventListener('pointercancel', handlePointerUp);
  canvas.addEventListener('pointerout', handlePointerUp);

  let time = Math.random() * 1000;
  resize();

  // --- 描画ループ ---
  function draw() {
    time += TIME_SPEED;

    const a = baseA + Math.sin(time * 1.1) * 0.6;
    const b = baseB + Math.cos(time * 0.8) * 0.6;
    const c = baseC + Math.sin(time * 1.3) * 0.6;
    const d = baseD + Math.cos(time * 0.9) * 0.6;

    ctx.fillStyle = `rgba(5, 6, 8, ${TRAIL_FADE})`;
    ctx.fillRect(0, 0, width, height);
    ctx.globalCompositeOperation = 'lighter';

    const minX = -cx / scale;
    const maxX = (width - cx) / scale;
    const minY = -cy / scale;
    const maxY = (height - cy) / scale;

    // タッチしている間、その位置から光（パーティクル）が継続的に湧き出すエフェクト
    activePointers.forEach(pointer => {
      const px = (pointer.x - cx) / scale;
      const py = (pointer.y - cy) / scale;
      for (let j = 0; j < 15; j++) {
        const p = particles[Math.floor(Math.random() * PARTICLE_COUNT)];
        p.x = px + (Math.random() - 0.5) * 0.05;
        p.y = py + (Math.random() - 0.5) * 0.05;
        const angle = Math.random() * Math.PI * 2;
        const power = Math.random() * 3;
        p.vx = Math.cos(angle) * power;
        p.vy = Math.sin(angle) * power;
        p.colorOffset = pointer.hue;
      }
    });

    for (let i = 0; i < PARTICLE_COUNT; i++) {
      let p = particles[i];
      let isWarped = false;

      // 画面のランダムな位置への再配置（新陳代謝）
      if (Math.random() < 0.002) { 
        p.x = (Math.random() - 0.5) * (width / scale) * 1.5;
        p.y = (Math.random() - 0.5) * (height / scale) * 1.5;
        p.vx = (Math.random() - 0.5) * 2;
        p.vy = (Math.random() - 0.5) * 2;
        p.colorOffset = (Math.random() - 0.5) * 80;
        isWarped = true;
      }

      const oldScreenX = cx + p.x * scale;
      const oldScreenY = cy + p.y * scale;

      // アトラクターの数式ベクトル
      let targetVx = Math.sin(a * p.y) + c * Math.cos(a * p.x) + (Math.random() - 0.5) * 0.08;
      let targetVy = Math.sin(b * p.x) + d * Math.cos(b * p.y) + (Math.random() - 0.5) * 0.08;

      // タッチ地点へ少し引き寄せる（重力効果）
      activePointers.forEach(pointer => {
        const px = (pointer.x - cx) / scale;
        const py = (pointer.y - cy) / scale;
        const dx = px - p.x;
        const dy = py - p.y;
        const distSq = dx * dx + dy * dy;
        const pull = 0.05 / (distSq + 0.1); // 距離が近いほど引力が強い
        targetVx += dx * pull;
        targetVy += dy * pull;
      });

      // 慣性
      p.vx = p.vx * FRICTION + targetVx * FORCE;
      p.vy = p.vy * FRICTION + targetVy * FORCE;

      // 位置更新
      p.x += p.vx * FLOW_SPEED;
      p.y += p.vy * FLOW_SPEED;

      // 画面端でのバウンド
      if (p.x < minX) { p.x = minX; p.vx *= BOUNCE; } 
      else if (p.x > maxX) { p.x = maxX; p.vx *= BOUNCE; }
      if (p.y < minY) { p.y = minY; p.vy *= BOUNCE; } 
      else if (p.y > maxY) { p.y = maxY; p.vy *= BOUNCE; }

      const newScreenX = cx + p.x * scale;
      const newScreenY = cy + p.y * scale;

      if (!isWarped) {
        const speed = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
        
        // 速度と時間、粒子固有の色を組み合わせる
        const hue = baseHue - Math.min(speed * 15, 50) + Math.sin(time) * 20 + p.colorOffset; 
        const lightness = Math.min(75, 25 + speed * 10);
        const saturation = 70 + (Math.random() - 0.5) * 20; 
        
        ctx.strokeStyle = `hsla(${hue}, ${saturation}%, ${lightness}%, 0.45)`;
        ctx.lineWidth = 1;

        ctx.beginPath();
        ctx.moveTo(oldScreenX, oldScreenY);
        ctx.lineTo(newScreenX, newScreenY);
        ctx.stroke();
      }
    }

    ctx.globalCompositeOperation = 'source-over';
    requestAnimationFrame(draw);
  }

  draw();
</script>
</body>
</html>
